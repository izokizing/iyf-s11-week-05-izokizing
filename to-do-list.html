<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-DO LIst</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="container">
      <h1>My To-Do List</h1>

      <form id="todo-form">
        <input type="text" id="todo-input" placeholder="What needs to be dpne?" required>
        <button type="submit">Add</button>
      </form>

      <div class="filters">
        <button class="filter active" data-filter="all">All</button>
        <button class="filter " data-filter="all">Active</button>
        <button class="filter active" data-filter="completed">Completed</button>
      </div>
      <ul id="todo-list">
        
      </ul>
    </div>
    
  </body>
  </html>
